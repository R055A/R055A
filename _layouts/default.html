<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">
  <head>
    <meta name="color-scheme" content="light dark">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/14985050?v=4">
    <link rel="apple-touch-icon" href="https://avatars.githubusercontent.com/u/14985050?v=4">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-96EN6VBJXM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-96EN6VBJXM');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
    <meta name="google-site-verification" content="CUwzk7c9yoUcwcmT0BcD61_cK7RsUNN6PVvJQudFfZs" />
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      .markdown-body object {
        display: inline-block;
        max-width: 100%;
        background-color: transparent;
        border-radius: 6px;
        overflow: hidden;
      }
      .site-centered {
        text-align: center;
      }
      .site-centered object,
      .site-centered img {
        display: inline-block;
      }
      .site-nav-item {
        margin-left: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .site-nav {
        margin-top: 24px;
        padding-top: 16px;
        padding-bottom: 16px;
        border-top: 1px solid #d0d7de;
      }
      .site-nav a {
        font-weight: 600;
        text-decoration: none;
      }
      .site-nav a:hover {
        text-decoration: underline;
      }
      .site-nav-dash {
        color: inherit;
      }
      .site-nav-favicon {
        width: 16px;
        height: 16px;
        vertical-align: middle;
      }
      .site-footer {
        margin-top: 0;
        padding-top: 16px;
        border-top: 1px solid #d0d7de;
        color: #57606a;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #0d1117;
          color: #f0f6fc;
        }
        .markdown-body object {
          background-color: #0d1117;
        }
        .markdown-body {
          background-color: #0d1117;
          color: #f0f6fc;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
          color: #f0f6fc;
          border-bottom-color: #3d444d;
        }
        .markdown-body a {
          color: #4493f8;
        }
        .markdown-body a:hover {
          color: #58a6ff;
        }
        .markdown-body hr {
          background-color: #3d444d;
        }
        .markdown-body blockquote {
          color: #9198a1;
          border-left-color: #3d444d;
        }
        .markdown-body code,
        .markdown-body tt {
          background-color: rgba(110, 118, 129, 0.4);
          color: #f0f6fc;
        }
        .markdown-body pre {
          background-color: #161b22;
          color: #f0f6fc;
        }
        .markdown-body pre code {
          background-color: transparent;
        }
        .markdown-body table tr {
          background-color: #0d1117;
          border-top-color: #3d444d;
        }
        .markdown-body table tr:nth-child(2n) {
          background-color: #161b22;
        }
        .markdown-body table th,
        .markdown-body table td {
          border-color: #3d444d;
        }
        .markdown-body img {
          background-color: transparent;
        }
        .markdown-body kbd {
          background-color: #161b22;
          border-color: #3d444d;
          color: #f0f6fc;
          box-shadow: inset 0 -1px 0 #3d444d;
        }
        .site-nav {
          border-top-color: #3d444d;
        }
        .site-footer {
          border-top-color: #3d444d;
          color: #9198a1;
        }
      }
    </style>
    {% include head-custom.html %}
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">
      <h1><a href="{{ site.profile_url }}">{{ site.title }}</a></h1>
      <div class="site-centered">
        {{ content }}
        <nav class="site-nav">
          <img
            class="site-nav-favicon"
            src="https://avatars.githubusercontent.com/u/174600572?s=200&v=4"
            alt=""
            width="16"
            height="16"
          >
          <a href="https://uni-git-projects.github.io/.github/">University Projects</a>
        </nav>
      </div>
      <footer class="site-footer">
        <small>
          © {{ "now" | date: "%Y" }} {{ site.author.name }}.
          <em>Code for the people. The source is open.</em>
        </small>
      </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
  </body>
</html>
